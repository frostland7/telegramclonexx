<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XGram Pro | Enterprise Messenger</title>
    
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --accent-color: var(--tg-theme-button-color, #2481cc);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
            --border-color: rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; }
        body { background: var(--bg-color); color: var(--text-color); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* NAV ENGINE */
        .page { display: none; height: 100vh; width: 100%; flex-direction: column; background: var(--bg-color); }
        .page.active { display: flex; }

        /* HEADER */
        .header { height: 50px; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border-color); font-weight: 600; font-size: 17px; }

        /* LIST VIEW */
        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-row { display: flex; align-items: center; gap: 15px; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .chat-row:active { background: var(--secondary-bg); }
        .avatar { width: 50px; height: 50px; background: #e0e0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #555; }
        .chat-body { flex: 1; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }

        /* DIALOG VIEW */
        .chat-room { display: none; flex-direction: column; height: 100vh; background: var(--secondary-bg); }
        .chat-room.active { display: flex; }
        .msg-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: #85d064; color: #fff; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #fff; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        /* FOOTER INPUT */
        .input-bar { height: 55px; background: var(--bg-color); display: flex; align-items: center; padding: 0 10px; gap: 10px; border-top: 1px solid var(--border-color); }
        .input-field { flex: 1; border: none; outline: none; padding: 10px; font-size: 16px; background: transparent; }
        .send-btn { color: var(--accent-color); font-weight: 600; cursor: pointer; padding: 10px; }
    </style>
</head>
<body>

    <div id="page-list" class="page active">
        <div class="header">Чаты</div>
        <div class="chat-list" id="chat-list-container">
            </div>
    </div>

    <div id="page-chat" class="chat-room">
        <div class="header" style="background: var(--bg-color);">
            <div onclick="App.navigate('list')" style="cursor:pointer; margin-right:15px;">←</div>
            <div id="chat-title">Диалог</div>
        </div>
        <div class="msg-area" id="msg-list"></div>
        <div class="input-bar">
            <input type="text" class="input-field" id="msg-input" placeholder="Сообщение...">
            <div class="send-btn" onclick="App.sendMessage()">Отпр.</div>
        </div>
    </div>

    <script>
        /**
         * XGram Core Engine v1.0
         * Управляет состоянием, UI и данными.
         */
        const App = {
            // Имитация базы данных (пока локально)
            db: {
                chats: [
                    { id: 1, name: "Telegram Support", last: "Добро пожаловать!" },
                    { id: 2, name: "Программирование", last: "Код написан?" }
                ],
                msgs: {
                    1: [{ text: "Добро пожаловать!", from: "other" }],
                    2: [{ text: "Код написан?", from: "other" }]
                }
            },

            // Инициализация
            init() {
                this.renderChats();
                console.log("System Initialized");
            },

            // Навигация
            navigate(pageId) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById('page-' + pageId).classList.add('active');
            },

            // Рендер списка чатов
            renderChats() {
                const container = document.getElementById('chat-list-container');
                container.innerHTML = '';
                this.db.chats.forEach(chat => {
                    const el = document.createElement('div');
                    el.className = 'chat-row';
                    el.innerHTML = `
                        <div class="avatar">${chat.name[0]}</div>
                        <div class="chat-body">
                            <div style="font-weight:600;">${chat.name}</div>
                            <div style="color:#999; font-size:14px;">${chat.last}</div>
                        </div>
                    `;
                    el.onclick = () => this.openChat(chat);
                    container.appendChild(el);
                });
            },

            // Открытие чата
            openChat(chat) {
                document.getElementById('chat-title').innerText = chat.name;
                this.activeChatId = chat.id;
                this.renderMessages(chat.id);
                this.navigate('chat');
            },

            // Рендер сообщений
            renderMessages(chatId) {
                const area = document.getElementById('msg-list');
                area.innerHTML = '';
                const msgs = this.db.msgs[chatId] || [];
                msgs.forEach(m => {
                    const d = document.createElement('div');
                    d.className = 'msg ' + m.from;
                    d.innerText = m.text;
                    area.appendChild(d);
                });
                area.scrollTop = area.scrollHeight;
            },

            // Отправка
            sendMessage() {
                const inp = document.getElementById('msg-input');
                if(!inp.value) return;
                
                // Добавляем в массив
                if(!this.db.msgs[this.activeChatId]) this.db.msgs[this.activeChatId] = [];
                this.db.msgs[this.activeChatId].push({ text: inp.value, from: 'me' });
                
                // Перерисовка
                this.renderMessages(this.activeChatId);
                inp.value = '';
            }
        };

        // Запуск системы
        document.addEventListener('DOMContentLoaded', () => App.init());
        
        // Интеграция с ТГ
        if(window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    </script>
</body>
</html>

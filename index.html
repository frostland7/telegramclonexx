<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xgram Realtime Engine</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0e1621; --item-bg: #17212b; --text: #ffffff; --text-secondary: #708499; --accent: #2481cc; --border-color: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .page { display: none; padding: 20px; height: 100%; flex-direction: column; }
        .page.active { display: flex; }
        input { width: 100%; padding: 14px; background: var(--item-bg); border: 1px solid var(--border-color); color: var(--text); border-radius: 12px; margin-bottom: 10px; outline: none; }
        .btn { background: var(--accent); color: white; padding: 14px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; }
        .item-card { background: var(--item-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid var(--border-color); }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; margin: 5px; }
        .msg.in { background: var(--item-bg); align-self: flex-start; }
        .msg.out { background: var(--accent); align-self: flex-end; }
        nav { position: fixed; bottom: 0; width: 100%; background: var(--item-bg); display: none; justify-content: space-around; padding: 15px; border-top: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <div id="toast-container" style="position:fixed; top:20px; width:100%; text-align:center; z-index:999;"></div>

    <div id="page-auth" class="page active">
        <div style="margin: auto; width: 100%; max-width: 350px;">
            <h2 style="margin-bottom: 20px;">Вход</h2>
            <select id="auth-method" style="width:100%; padding: 12px; margin-bottom: 10px; background: var(--item-bg); color: white;">
                <option value="email">Email</option>
                <option value="phone">Телефон</option>
            </select>
            <input type="text" id="auth-input" placeholder="Введите данные">
            <button class="btn" onclick="executeAuthenticationWorkflow()">Продолжить</button>
        </div>
    </div>

    <div id="page-chats" class="page">
        <h3>Ваши чаты</h3>
        <div id="chat-list" style="margin-top:20px;"></div>
        <input type="text" id="input-search" placeholder="Поиск @username">
        <button class="btn" onclick="searchForUser()">Найти</button>
    </div>

    <div id="page-dialog" class="page">
        <button onclick="navigateToPage('chats')" class="btn" style="width:auto; padding:5px 15px;">← Назад</button>
        <div id="messages" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; padding:10px 0;"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="input-msg" style="margin:0;">
            <button class="btn" style="width:auto;" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <nav id="nav-menu">
        <div onclick="navigateToPage('chats')">💬 Чаты</div>
    </nav>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyAUFvEAHdIbYvflB7n-DMQXM_ydZcuT35o",
            projectId: "jwbsjadh",
            databaseURL: "https://jwbsjadh-default-rtdb.firebaseio.com/"
        });
        const db = firebase.database();
        let me = null, cid = null;

        function toast(t) { alert(t); }

        function navigateToPage(p) {
            document.querySelectorAll('.page').forEach(e => e.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            if(p !== 'auth') document.getElementById('nav-menu').style.display = 'flex';
        }

        function executeAuthenticationWorkflow() {
            let val = document.getElementById('auth-input').value;
            if(val.length < 3) return toast("Мало символов");
            let id = val.replace(/[^a-z0-9]/gi, '_');
            db.ref('users/' + id).get().then(s => {
                me = s.exists() ? s.val() : { id: id, username: "user" + Math.floor(Math.random()*999) };
                if(!s.exists()) db.ref('users/' + id).set(me);
                navigateToPage('chats');
                loadChats();
            });
        }

        function loadChats() {
            db.ref('chats').on('value', s => {
                let list = document.getElementById('chat-list');
                list.innerHTML = '';
                let chats = s.val() || {};
                Object.keys(chats).forEach(k => {
                    if(k.includes(me.id)) list.innerHTML += `<div class="item-card" onclick="openChat('${k}')">💬 Чат: ${k}</div>`;
                });
            });
        }

        function searchForUser() {
            let tag = document.getElementById('input-search').value;
            openChat(me.id < tag ? me.id + "_" + tag : tag + "_" + me.id);
        }

        function openChat(id) {
            cid = id;
            navigateToPage('dialog');
            db.ref('chats/' + cid + '/msgs').on('child_added', s => {
                let m = s.val();
                document.getElementById('messages').innerHTML += `<div class="msg ${m.from === me.id ? 'out':'in'}">${m.text}</div>`;
            });
        }

        function sendMessage() {
            let text = document.getElementById('input-msg').value;
            db.ref('chats/' + cid + '/msgs').push({from: me.id, text: text});
            document.getElementById('input-msg').value = '';
        }
    </script>
</body>
</html>

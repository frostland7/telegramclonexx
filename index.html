    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #000000);
            --tg-btn: var(--tg-theme-button-color, #2481cc);
            --tg-btn-text: var(--tg-theme-button-text-color, #ffffff);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, sans-serif;
        }
        body {
            background-color: var(--tg-bg);
            color: var(--tg-text);
            height: 100vh;
            overflow: hidden;
        }
        .page {
            display: none;
            height: 100vh;
            flex-direction: column;
            padding: 15px;
        }
        .page.active {
            display: flex;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
        }
        .input-box {
            width: 100%;
            padding: 18px;
            background-color: rgba(0, 0, 0, 0.05);
            border: none;
            border-radius: 14px;
            color: var(--tg-text);
            font-size: 17px;
            margin-bottom: 5px;
        }
        .button-box {
            width: 100%;
            padding: 18px;
            background-color: var(--tg-btn);
            color: var(--tg-btn-text);
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            text-align: center;
        }
        .header-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 10px 0;
        }
        .chat-card {
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.03);
            border-radius: 14px;
            cursor: pointer;
            font-size: 16px;
        }
        .msg-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg-bubble {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 85%;
            font-size: 16px;
        }
        .bubble-in {
            background-color: rgba(0, 0, 0, 0.08);
            align-self: flex-start;
        }
        .bubble-out {
            background-color: var(--tg-btn);
            color: var(--tg-btn-text);
            align-self: flex-end;
        }
    </style>
</head>

    <div id="page-auth" class="page active">

            <div class="header-title">Вход</div>

        </div>
    </div>

        <button id="btn-search" class="button-box">Найти</button>
    </div>

    <div id="page-dialog" class="page">
        <button id="btn-back" class="button-box" style="padding: 12px; margin-bottom: 10px;">Назад</button>
        <div id="messages" class="msg-list"></div>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="inp-msg" class="input-box" style="margin: 0;">
            <button id="btn-send" class="button-box" style="width: 90px;">Отпр</button>
        </div>

<script>

    const tg = window.Telegram.WebApp;

    class XGram {
        constructor() {
            this.user = { id: null };
            this.activeChat = null;
            this.bindEvents();
        }

        navigate(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            if (pageId === 'dialog') tg.BackButton.show();
            else tg.BackButton.hide();
        }

        bindEvents() {
            document.getElementById('btn-login').onclick = () => {
                const id = document.getElementById('inp-id').value;
                if (!id) return;
                this.user.id = id;
                db.ref('users/' + id).set({ status: 'online' });
                this.navigate('chats');
                this.loadChats();
            };

            document.getElementById('btn-search').onclick = () => {
                const target = document.getElementById('inp-search').value;
                if (!target) return;
                this.activeChat = [this.user.id, target].sort().join('_');
                this.navigate('dialog');
                this.loadMessages();
            };

            document.getElementById('btn-send').onclick = () => {
                const msg = document.getElementById('inp-msg').value;
                if (!msg) return;
                db.ref('chats/' + this.activeChat + '/msgs').push({
                    from: this.user.id,
                    text: msg,
                    time: Date.now()
                });
                document.getElementById('inp-msg').value = '';
            };

            document.getElementById('btn-back').onclick = () => this.navigate('chats');
            tg.BackButton.onClick(() => this.navigate('chats'));
        }

        loadChats() {
            db.ref('chats').on('value', snap => {
                const list = document.getElementById('chat-list');
                list.innerHTML = '';
                const chats = snap.val() || {};
                Object.keys(chats).forEach(key => {
                    if (key.includes(this.user.id)) {
                        const div = document.createElement('div');
                        div.className = 'chat-card';
                        div.innerText = 'Чат: ' + key.replace(this.user.id, '').replace('_', '');
                        div.onclick = () => {
                            this.activeChat = key;
                            this.navigate('dialog');
                            this.loadMessages();
                        };
                        list.appendChild(div);
                    }
                });
            });
        }

        loadMessages() {
            const area = document.getElementById('messages');
            area.innerHTML = '';
            db.ref('chats/' + this.activeChat + '/msgs').on('child_added', snap => {
                const data = snap.val();
                const div = document.createElement('div');
                div.className = 'msg-bubble ' + (data.from === this.user.id ? 'bubble-out' : 'bubble-in');
                div.innerText = data.text;
                area.appendChild(div);
                area.scrollTop = area.scrollHeight;
            });
        }

        initServices() {
            console.log("Service Initialized");
        }
    }

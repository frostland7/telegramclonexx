<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XGram Enterprise System</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-shell">
        
        <div id="p-auth" class="page active">
            <div style="margin: auto; width: 100%;">
                <h1 class="header-title">XGram Login</h1>
                <input type="text" id="inp-login" class="ui-input" placeholder="Введите User ID">
                <button id="btn-login" class="ui-btn">Войти в систему</button>
            </div>
        </div>

        <div id="p-chats" class="page">
            <h2 class="header-title">Ваши чаты</h2>
            <div id="chat-list" class="chat-container"></div>
            <div style="margin-top: auto;">
                <input type="text" id="inp-search" class="ui-input" placeholder="ID собеседника">
                <button id="btn-start" class="ui-btn">Начать диалог</button>
            </div>
        </div>

        <div id="p-dialog" class="page">
            <button id="btn-back" class="ui-btn" style="background: transparent; color: var(--accent);">← Назад</button>
            <div id="msg-list" class="msg-container"></div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="inp-msg" class="ui-input" style="margin:0;">
                <button id="btn-send" class="ui-btn" style="width: 80px; margin:0;">Send</button>
            </div>
        </div>

    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>

    <script>
        // Служебный скрипт для предотвращения ошибок загрузки
        window.addEventListener('error', (event) => {
            console.error("Critical System Error:", event.message);
        });
    </script>
</body>
</html>

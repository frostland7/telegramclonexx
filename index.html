<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XGram Enterprise</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="page-list" class="page active">
        <div class="header"><span>Telegram</span><span onclick="UI.navigate('settings')">⚙️</span></div>
        <div class="list-wrap" id="chat-list"></div>
    </div>

    <div id="page-chat" class="page">
        <div class="header">
            <span onclick="UI.navigate('list')" style="margin-right:15px;">←</span>
            <span id="chat-title">Диалог</span>
        </div>
        <div class="msg-container" id="msg-list"></div>
        <div class="input-bar">
            <input type="text" class="input-field" id="msg-input" placeholder="Сообщение...">
            <span class="btn-send" onclick="App.sendMessage()">Отпр.</span>
        </div>
    </div>

    <div id="page-settings" class="page">
        <div class="header"><span onclick="UI.navigate('list')" style="margin-right:15px;">←</span>Настройки</div>
        <div class="settings-item">Аккаунт: +7 999 000-00-00</div>
        <div class="settings-item" onclick="location.reload()">Выйти</div>
    </div>

    <script src="data.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
    <script src="api.js"></script>
    <script src="utils.js"></script>
</body>
</html>
